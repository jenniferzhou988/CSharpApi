<h2 mat-dialog-title>Import Stock — {{ product.productName }}</h2>

<mat-dialog-content>
  <!-- Import history -->
  @if (importRecords.length > 0) {
  <table mat-table [dataSource]="importRecords" class="full-width history-table">
    <ng-container matColumnDef="importPrice">
      <th mat-header-cell *matHeaderCellDef>Import Price</th>
      <td mat-cell *matCellDef="let r">{{ r.importPrice | currency }}</td>
    </ng-container>
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Quantity</th>
      <td mat-cell *matCellDef="let r">{{ r.quantity }}</td>
    </ng-container>
    <ng-container matColumnDef="comment">
      <th mat-header-cell *matHeaderCellDef>Comment</th>
      <td mat-cell *matCellDef="let r">{{ r.comment || '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="created">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let r">{{ r.created | date:'short' }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  } @else {
  <p class="empty-hint">No import records yet.</p>
  }

  <!-- New import form -->
  <form [formGroup]="form" (ngSubmit)="onImport()" class="import-form">
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Import Price</mat-label>
        <input matInput formControlName="importPrice" type="number">
        <span matPrefix>$&nbsp;</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantity</mat-label>
        <input matInput formControlName="quantity" type="number">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Comment</mat-label>
      <input matInput formControlName="comment">
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      Record Import
    </button>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>

<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEdit ? 'Edit Product' : 'New Product' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Product Name</mat-label>
          <input matInput formControlName="productName">
          @if (form.get('productName')?.hasError('required') && form.get('productName')?.touched) {
          <mat-error>Product name is required</mat-error>
          }
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>SKU</mat-label>
            <input matInput formControlName="sku">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>UPC</mat-label>
            <input matInput formControlName="upc">
          </mat-form-field>
        </div>

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Brand Name</mat-label>
            <input matInput formControlName="brandName">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Price</mat-label>
            <input matInput formControlName="price" type="number">
            <span matPrefix>$&nbsp;</span>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3"></textarea>
        </mat-form-field>

        <div class="actions">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit"
                  [disabled]="form.invalid || loading">
            {{ isEdit ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
